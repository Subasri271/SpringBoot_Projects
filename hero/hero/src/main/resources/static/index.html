<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Super Heroes</title>
</head>
<body>
<center>

<h1>SUPER HEROES</h1>
<form id="heroForm">
    Name:<input id="name">
    Power:<input id="power">
    <button type="submit">Add</button>
</form>
</center>
<h2>HEROES</h2>
<ul id="herolist"></ul>

<script>
    const form=document.getElementById("heroForm");
    const list=document.getElementById("herolist");

    fetch("/heroes")
        .then(res=>res.json())
        .then(data=> data.forEach(h=> addHero(h)));

    form.addEventListener("submit",e=>{
        e.preventDefault();
        const hero={
            name:document.getElementById("name").value,
            power:document.getElementById("power").value
        };
        fetch("/heroes",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(hero)
        })
            .then(res=>res.json())
            .then(h=>addHero(h));
        form.reset();
    });
    function addHero(hero){
        const li=document.createElement("li");
        li.textContent=hero.name +"-"+hero.power;
        list.appendChild(li);

    }
</script>

</body>
</html>
